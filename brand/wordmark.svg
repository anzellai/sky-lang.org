<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="Sky Lang">
    <!--
        Horizontal wordmark: icon on the left + "SKY LANG" text on the right.
        Same geometric "S" path as icon.svg, mirrored typographically by the
        two-tone text. Designed for README headers, social previews, slides.
    -->
    <defs>
        <linearGradient id="wm-s-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#a5b4fc"/>
            <stop offset="100%" stop-color="#4f46e5"/>
        </linearGradient>
    </defs>

    <!-- Icon block (left) — 160x160 square, vertically centered in 200 height -->
    <rect x="20" y="20" width="160" height="160" rx="30" ry="30" fill="#1a1a2e"/>
    <path d="M 145 60 L 55 60 L 55 100 L 130 100 L 130 140 L 40 140"
          stroke="url(#wm-s-gradient)"
          stroke-width="22"
          stroke-linecap="round"
          stroke-linejoin="round"
          fill="none"
          transform="translate(20, 20)"/>

    <!-- Wordmark text (right) — vertically centered against the icon block -->
    <text x="210" y="100"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
          font-size="72"
          font-weight="800"
          letter-spacing="4"
          dominant-baseline="middle"
          fill="#1a1a2e">SKY</text>
    <text x="380" y="100"
          font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Inter, system-ui, sans-serif"
          font-size="72"
          font-weight="500"
          letter-spacing="4"
          dominant-baseline="middle"
          fill="#64748b">LANG</text>
</svg>
